networks:
  infra-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  lan:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.10.0/24
  wan:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24

volumes:
  keycloak_data:
  keycloak_postgres_data:
  guacamole_postgres_data:
  guacamole_schema:
  vault_data:
  vault_logs:

services:

  # ─── PostgreSQL for Keycloak ─────────────────────────────────────────────────
  postgres-keycloak:
    image: postgres:15-alpine
    container_name: postgres-keycloak
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_secret
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    networks:
      infra-net:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Keycloak ────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_secret
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_secret
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY: edge
      KC_FRONTEND_URL: http://localhost:8080
      KC_HOSTNAME: localhost:8080
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    volumes:
      - keycloak_data:/opt/keycloak/data
    networks:
      infra-net:
        ipv4_address: 172.20.0.11
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ─── Vault ───────────────────────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    container_name: vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/data
      - vault_logs:/vault/logs
    command: server -dev
    networks:
      infra-net:
        ipv4_address: 172.20.0.13
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s



  # ─── Open Policy Agent (OPA) ─────────────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:latest
    container_name: opa
    restart: unless-stopped
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--log-level=info"
      - "--log-format=json"
      - "--addr=0.0.0.0:8181"
      - "/policies"
    volumes:
      - ./opa/policies:/policies
    networks:
      infra-net:
        ipv4_address: 172.20.0.14
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PostgreSQL for Guacamole ────────────────────────────────────────────────
  postgres-guacamole:
    image: postgres:15-alpine
    container_name: postgres-guacamole
    restart: unless-stopped
    environment:
      POSTGRES_DB: guacamole
      POSTGRES_USER: guacamole
      POSTGRES_PASSWORD: guacamole_secret
    volumes:
      - guacamole_postgres_data:/var/lib/postgresql/data
      - guacamole_schema:/docker-entrypoint-initdb.d:ro
    networks:
      infra-net:
        ipv4_address: 172.20.0.15
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guacamole"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Guacamole Daemon (guacd) ─────────────────────────────────────────────
  guacd:
    image: guacamole/guacd:latest
    container_name: guacd
    restart: unless-stopped
    networks:
      infra-net:
        ipv4_address: 172.20.0.20

  # ─── Guacamole Web UI ─────────────────────────────────────────────────────
  guacamole:
    image: guacamole/guacamole:latest
    container_name: guacamole
    restart: unless-stopped
    depends_on:
      postgres-guacamole:
        condition: service_healthy
      guacd:
        condition: service_started
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: 4822
      EXTENSION_PRIORITY: openid, jdbc-postgresql
      POSTGRESQL_HOSTNAME: postgres-guacamole
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE: guacamole
      POSTGRESQL_USER: guacamole
      POSTGRESQL_PASSWORD: guacamole_secret
      POSTGRESQL_ENABLED: "true"
      # Keycloak SSO (OpenID Connect)
    
      OPENID_CLIENT_ID: guacamole
      OPENID_AUTHORIZATION_ENDPOINT: http://localhost:8080/realms/corp/protocol/openid-connect/auth
      OPENID_JWKS_ENDPOINT: http://keycloak:8080/realms/corp/protocol/openid-connect/certs
      OPENID_ISSUER: http://localhost:8080/realms/corp
      OPENID_REDIRECT_URI: http://localhost:8888/guacamole
      OPENID_USERNAME_CLAIM_TYPE: preferred_username
      OPENID_GROUPS_CLAIM_TYPE: groups
      OPENID_SCOPE: openid email profile groups
    ports:
      - "8888:8080"
    volumes:
      - "guacamole_schema:/opt/guacamole/extensions/guacamole-auth-jdbc/postgresql/schema:ro"
    networks:
      infra-net:
        ipv4_address: 172.20.0.21
      lan:
        ipv4_address: 192.168.10.10
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/guacamole || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s